name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Verify
        run: make verify

  bundle:
    name: Build Bundle
    runs-on: ubuntu-latest
    needs:
      - verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Build bundle
        run: |
          make bundle
          sha256sum dist/*.tar.gz > dist/SHA256SUMS

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: mattermost-policy-plugin
          path: |
            dist/*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error

